<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="EduTrackX - Student Result Management System. Login to access your grades, academic records, and performance analytics.">
  <title>EduTrackX — Student Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <!-- ====== Loading Screen ====== -->
  <div class="loader-overlay" id="loader-overlay">
    <div class="loader-content">
      <div class="loader-ring">
        <div class="loader-ring-inner"></div>
      </div>
      <p class="loader-text">Loading EduTrackX<span class="loader-dots"></span></p>
    </div>
  </div>

  <!-- ====== Three.js Canvas Background ====== -->
  <canvas id="bg-canvas"></canvas>

  <!-- ====== Floating Background Shapes ====== -->
  <div class="floating-shapes" id="floating-shapes" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="blob blob-5"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="glow-orb glow-orb-3"></div>
  </div>

  <!-- ====== Login Card ====== -->
  <main class="login-wrapper" id="login-wrapper">
    <div class="login-card" id="login-card">

      <!-- Glass Reflection Layer -->
      <div class="card-shine" id="card-shine"></div>

      <!-- Top Icon -->
      <div class="card-icon" id="card-icon">
        <img src="{{ url_for('static', filename='assets/graduation-cap.png') }}" alt="Graduation Cap" class="cap-img" id="cap-img">
      </div>

      <!-- Branding -->
      <h1 class="brand-title" id="brand-title">
        <span class="brand-edu">Edu</span><span class="brand-track">Track</span><span class="brand-x">X</span>
      </h1>
      <p class="brand-subtitle" id="brand-subtitle">Student Result Management System</p>

      <!-- Divider -->
      <div class="divider" id="divider">
        <span class="divider-line"></span>
        <span class="divider-text">Sign in to continue</span>
        <span class="divider-line"></span>
      </div>

      <!-- Login Form -->
      <form class="login-form" id="login-form" autocomplete="off" novalidate>

        <!-- Enrollment Number -->
        <div class="input-group" id="enrollment-group">
          <div class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          <input type="text" id="enrollment-input" class="form-input" placeholder=" " required autocomplete="off">
          <label for="enrollment-input" class="form-label">Enrollment Number</label>
          <div class="input-glow"></div>
        </div>

        <!-- Password -->
        <div class="input-group" id="password-group">
          <div class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
          <input type="password" id="password-input" class="form-input" placeholder=" " required autocomplete="off">
          <label for="password-input" class="form-label">Password</label>
          <button type="button" class="eye-toggle" id="eye-toggle" aria-label="Toggle password visibility">
            <!-- Eye Open -->
            <svg class="eye-icon eye-open" id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <!-- Eye Closed -->
            <svg class="eye-icon eye-closed hidden" id="eye-closed" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
              </path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
          <div class="input-glow"></div>
        </div>

        <!-- Options Row -->
        <div class="form-options" id="form-options">
          <label class="remember-me" id="remember-me-label">
            <input type="checkbox" id="remember-me" checked>
            <span class="custom-checkbox">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </span>
            <span class="remember-text">Remember me</span>
          </label>
          <a href="#" class="forgot-link" id="forgot-link">Forgot Password?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="sign-in-btn" id="sign-in-btn">
          <span class="btn-text" id="btn-text">Sign In</span>
          <span class="btn-loader hidden" id="btn-loader">
            <svg class="spinner" width="20" height="20" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="3"
                stroke-dasharray="31.4 31.4" stroke-linecap="round" />
            </svg>
          </span>
          <div class="btn-glow"></div>
        </button>

      </form>

      <!-- Footer -->
      <p class="card-footer" id="card-footer">
        Powered by <strong>EduTrackX</strong> &middot; &copy; 2026
      </p>
    </div>
  </main>

  <!-- Three.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
