{% extends 'base.html' %}
{% block title %}EduTrackX — Add Student{% endblock %}

{% block content %}
<div class="login-card" id="login-card">
  <div class="card-shine" id="card-shine"></div>

  <div style="text-align: center; margin-bottom: 30px; transform: translateZ(20px);">
    <h2 style="color: var(--text-primary); font-size: 24px; font-weight: 600;">Add New Student</h2>
    <p style="color: var(--text-muted); font-size: 13px;">Register a student in the system</p>
  </div>

  <form class="login-form" method="POST" action="{{ url_for('add_student') }}" autocomplete="off" novalidate>

    <div class="input-group">
      <input type="text" name="name" id="name" class="form-input" placeholder=" " required autocomplete="off" style="padding-left: 20px;">
      <label for="name" class="form-label" style="left: 20px;">Full Name</label>
      <div class="input-glow"></div>
    </div>

    <div class="input-group">
      <input type="text" name="roll_no" id="roll_no" class="form-input" placeholder=" " required autocomplete="off" style="padding-left: 20px;">
      <label for="roll_no" class="form-label" style="left: 20px;">Roll Number</label>
      <div class="input-glow"></div>
    </div>

    <div class="input-group">
      <input type="text" name="student_class" id="student_class" class="form-input" placeholder=" " required autocomplete="off" style="padding-left: 20px;">
      <label for="student_class" class="form-label" style="left: 20px;">Class / Section</label>
      <div class="input-glow"></div>
    </div>

    <button type="submit" class="sign-in-btn" style="margin-top: 10px;">
      <span class="btn-text">Add Student</span>
      <div class="btn-glow"></div>
    </button>
  </form>

  <div style="text-align: center; margin-top: 20px; transform: translateZ(10px);">
    <a href="{{ url_for('dashboard') }}" class="forgot-link" style="font-size: 13px;">&larr; Back to Dashboard</a>
  </div>
</div>
{% endblock %}
